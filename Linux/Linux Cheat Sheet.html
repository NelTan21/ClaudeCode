<title>Linux Command Cheat Sheet</title>
<meta name="description" content="Searchable, categorized Linux/Bash command reference" />
<style>
  :root{
    --bg:#14161b;
    --surface:#1b1e25;
    --surface-2:#232630;
    --border:#2d313c;
    --text:#e7e5de;
    --text-muted:#93969e;
    --accent:#e3982f;
    --accent-soft:#3a2c17;
    --accent-2:#5fb3a3;
    --shadow: 0 8px 24px rgba(0,0,0,.35);
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, "SF Mono", Menlo, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"]{
    --bg:#f1efe8;
    --surface:#ffffff;
    --surface-2:#f6f4ee;
    --border:#ddd7c8;
    --text:#23241f;
    --text-muted:#6c6a60;
    --accent:#a8650f;
    --accent-soft:#f3e3c8;
    --accent-2:#2f7d70;
    --shadow: 0 8px 24px rgba(30,25,10,.08);
    color-scheme: light;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      --bg:#f1efe8;
      --surface:#ffffff;
      --surface-2:#f6f4ee;
      --border:#ddd7c8;
      --text:#23241f;
      --text-muted:#6c6a60;
      --accent:#a8650f;
      --accent-soft:#f3e3c8;
      --accent-2:#2f7d70;
      --shadow: 0 8px 24px rgba(30,25,10,.08);
      color-scheme: light;
    }
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:1rem;
    padding:.85rem 1.25rem;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--border);
  }
  .brand{
    display:flex; align-items:baseline; gap:.55rem;
    white-space:nowrap;
  }
  .brand .glyph{
    font-family:var(--mono);
    color:var(--accent);
    font-size:1.1rem;
  }
  .brand h1{
    font-size:1rem;
    font-weight:700;
    letter-spacing:.01em;
    margin:0;
  }
  .brand .sub{
    font-size:.72rem;
    color:var(--text-muted);
    font-family:var(--mono);
  }

  .search-wrap{
    position:relative;
    flex:1;
    max-width:560px;
    margin-left:auto;
  }
  .search-box{
    display:flex; align-items:center; gap:.5rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem .7rem;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-box:focus-within{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .search-box svg{ flex:none; opacity:.6; }
  .search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--text);
    font-family:var(--mono);
    font-size:.88rem;
  }
  .search-box input::placeholder{ color:var(--text-muted); }
  .search-hint{
    font-family:var(--mono);
    font-size:.7rem;
    color:var(--text-muted);
    border:1px solid var(--border);
    border-radius:5px;
    padding:.05rem .35rem;
    flex:none;
  }
  .clear-btn{
    flex:none; display:none;
    background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-size:1rem; line-height:1; padding:0 .1rem;
  }
  .clear-btn:hover{ color:var(--text); }

  .suggest{
    position:absolute; left:0; right:0; top:calc(100% + 6px);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:min(60vh, 420px);
    overflow-y:auto;
    display:none;
    z-index:40;
  }
  .suggest.open{ display:block; }
  .suggest-item{
    display:flex; align-items:center; gap:.6rem;
    padding:.5rem .7rem;
    cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .suggest-item:last-child{ border-bottom:none; }
  .suggest-item.active, .suggest-item:hover{ background:var(--surface-2); }
  .suggest-item code{
    font-family:var(--mono);
    font-size:.82rem;
    color:var(--accent);
    white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
    max-width:38%;
  }
  .suggest-item .s-desc{
    font-size:.76rem;
    color:var(--text-muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    flex:1;
  }
  .suggest-item .s-cat{
    flex:none;
    font-size:.65rem;
    font-family:var(--mono);
    padding:.1rem .4rem;
    border-radius:99px;
    white-space:nowrap;
  }
  .suggest-empty{
    padding:.75rem .9rem;
    font-size:.8rem;
    color:var(--text-muted);
  }

  .theme-toggle{
    flex:none;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    width:2.15rem; height:2.15rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:var(--text);
  }
  .theme-toggle:hover{ border-color:var(--accent); }

  /* ---------- Layout ---------- */
  .shell{
    display:grid;
    grid-template-columns:220px 1fr;
    max-width:1280px;
    margin:0 auto;
  }
  nav.sidebar{
    position:sticky;
    top:60px;
    align-self:start;
    height:calc(100vh - 60px);
    overflow-y:auto;
    padding:1.1rem .75rem 2rem;
    border-right:1px solid var(--border);
  }
  .sidebar .count-all{
    font-family:var(--mono);
    font-size:.72rem;
    color:var(--text-muted);
    padding:0 .6rem .6rem;
  }
  .sidebar a{
    display:flex; align-items:center; gap:.5rem;
    text-decoration:none;
    font-size:.83rem;
    color:var(--text-muted);
    padding:.42rem .6rem;
    border-radius:8px;
    margin-bottom:2px;
  }
  .sidebar a:hover{ background:var(--surface-2); color:var(--text); }
  .sidebar a.active{ background:var(--accent-soft); color:var(--text); font-weight:600; }
  .sidebar .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .sidebar .label{ flex:1; }
  .sidebar .n{ font-family:var(--mono); font-size:.7rem; color:var(--text-muted); }

  main{ padding:1.5rem 1.75rem 4rem; min-width:0; }

  .result-bar{
    display:none;
    align-items:center; gap:.5rem;
    font-size:.8rem;
    color:var(--text-muted);
    margin-bottom:1rem;
    font-family:var(--mono);
  }
  body.filtering .result-bar{ display:flex; }

  section.cat{
    margin-bottom:2.25rem;
    scroll-margin-top:70px;
  }
  section.cat.hidden-by-search{ display:none; }
  .cat-head{
    display:flex; align-items:baseline; gap:.6rem;
    margin-bottom:.15rem;
  }
  .cat-head .dot{ width:10px; height:10px; border-radius:50%; flex:none; }
  .cat-head h2{
    font-size:1.05rem;
    margin:0;
    letter-spacing:.01em;
  }
  .cat-desc{
    color:var(--text-muted);
    font-size:.82rem;
    margin:.15rem 0 .9rem;
    max-width:62ch;
  }

  .rows{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
  }
  .row{
    display:grid;
    grid-template-columns:minmax(160px,320px) 1fr;
    gap:.4rem 1rem;
    padding:.62rem .9rem;
    border-bottom:1px solid var(--border);
    align-items:start;
  }
  .row:last-child{ border-bottom:none; }
  .row.hidden-by-search{ display:none; }
  .row.pulse{ animation: pulse 1.1s ease; }
  @keyframes pulse{
    0%{ background:var(--accent-soft); }
    100%{ background:transparent; }
  }
  .row code{
    font-family:var(--mono);
    font-size:.83rem;
    color:var(--accent);
    word-break:break-word;
  }
  .row .desc{
    font-size:.83rem;
    color:var(--text-muted);
    line-height:1.5;
  }
  .row mark, .suggest-item mark{
    background:var(--accent-soft);
    color:var(--text);
    border-radius:3px;
    padding:0 1px;
  }

  @media (max-width:960px){
    .shell{ grid-template-columns:1fr; }
    nav.sidebar{
      position:sticky; top:60px; height:auto;
      display:flex; gap:.4rem; overflow-x:auto; overflow-y:hidden;
      border-right:none; border-bottom:1px solid var(--border);
      padding:.6rem .75rem;
      background:var(--bg);
    }
    .sidebar .count-all{ display:none; }
    .sidebar a{ flex:none; }
    .row{ grid-template-columns:1fr; }
  }
  @media (max-width:560px){
    .brand .sub{ display:none; }
    .search-hint{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .row.pulse{ animation:none; }
  }

  footer{
    text-align:center;
    font-size:.72rem;
    color:var(--text-muted);
    padding:1.5rem 0 2.5rem;
    font-family:var(--mono);
  }
</style>

<div class="topbar">
  <div class="brand">
    <span class="glyph">&gt;_</span>
    <h1>Linux Cheat Sheet</h1>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search commands, flags, concepts…" autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn" title="Clear" aria-label="Clear search">&times;</button>

  <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle color theme">
    <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main>
    <div class="result-bar" id="resultBar"></div>
    <div id="content"></div>
    <footer>Generated from basic_commands.sh, curl.sh &amp; Linux Reference.md</footer>
  </main>
</div>

<script>
/* ---------------- Data ---------------- */
const CATS = [
  { id:"nav",    label:"Navigation & Filesystem",   hue:24,  desc:"Move around and list the filesystem." },
  { id:"view",   label:"Viewing File Contents",      hue:50,  desc:"Read files without opening an editor." },
  { id:"files",  label:"Create, Copy, Move & Delete", hue:76, desc:"Manage files, directories and links." },
  { id:"grep",   label:"Searching Text — grep",      hue:150, desc:"Filter text streams and files for patterns." },
  { id:"find",   label:"Finding Files — find & which", hue:174, desc:"Locate files by name, type, size or date." },
  { id:"curl",   label:"Networking — curl",          hue:204, desc:"Transfer data to or from a server over HTTP and other protocols." },
  { id:"perm",   label:"Permissions & Ownership",    hue:198, desc:"Read and change who can access what." },
  { id:"proc",   label:"Process Management",         hue:222, desc:"Inspect and control running processes." },
  { id:"pkg",    label:"Package Management (apt)",   hue:262, desc:"Install, update and remove software." },
  { id:"edit",   label:"Editors & Manuals",          hue:286, desc:"Edit files and read documentation in-terminal." },
  { id:"vars",   label:"Variables & Environment",    hue:8,   desc:"Shell variables, env vars and basic output." },
  { id:"io",     label:"Pipes, Chaining & Exit Status", hue:44, desc:"Connect commands and react to success/failure." },
  { id:"read",   label:"Reading Input — read",       hue:110, desc:"Prompt for and capture user input in scripts." },
  { id:"hist",   label:"History Management",         hue:132, desc:"Inspect, edit and re-run commands from your shell history." },
  { id:"alias",  label:"Aliases & Shell Config",     hue:318, desc:"Create shortcuts for commands and control where they persist." },
  { id:"lsd",    label:"lsd — Modern ls Replacement", hue:186, desc:"A themeable, icon-aware alternative to ls." },
  { id:"concept",label:"Shell & System Concepts",    hue:300, desc:"Background knowledge behind the commands above." },
];

const ROWS = [
  // Navigation & Filesystem
  {c:"nav", cmd:"pwd", d:"Print the current working directory."},
  {c:"nav", cmd:"cd", d:"Change the current working directory."},
  {c:"nav", cmd:".", d:"Alias for the current directory; used to execute scripts in the current shell (e.g. ./script.sh)."},
  {c:"nav", cmd:"..", d:"Alias for the parent directory; used to navigate up one level."},
  {c:"nav", cmd:"ls", d:"List files and directories in the current working directory."},
  {c:"nav", cmd:"ls -l", d:"Long format: permissions, ownership, size, and modification date."},
  {c:"nav", cmd:"ls -a", d:"Include hidden files (those starting with a dot)."},
  {c:"nav", cmd:"ls -lh", d:"Long format with human-readable file sizes (KB, MB, …)."},
  {c:"nav", cmd:"ls -R", d:"List recursively, including all subdirectories."},
  {c:"nav", cmd:"ls -t", d:"Sort by modification time, most recently modified first."},
  {c:"nav", cmd:"ls -tr", d:"Sort by modification time, oldest first."},
  {c:"nav", cmd:"ls -X", d:"Sort by file extension."},
  {c:"nav", cmd:"ls -1", d:"Single-column output, one entry per line."},
  {c:"nav", cmd:"ls -d */", d:"List only directories in the current working directory."},
  {c:"nav", cmd:"ls -S", d:"Sort by file size, largest first."},
  {c:"nav", cmd:"ls -r", d:"Reverse the current sort order."},
  {c:"nav", cmd:'ls dir1 dir2 | grep "term"', d:"List dir1 and dir2, filtering the output to lines containing “term”."},

  // Viewing File Contents
  {c:"view", cmd:"cat file", d:"Print the contents of a file to the terminal."},
  {c:"view", cmd:"head -n 10 file1.txt", d:"Print the first 10 lines of file1.txt."},
  {c:"view", cmd:"tail -n 10 file1.txt", d:"Print the last 10 lines of file1.txt."},
  {c:"view", cmd:"more file", d:"Print a file one page at a time."},
  {c:"view", cmd:"less file", d:"Like more, but supports backward navigation through the file."},
  {c:"view", cmd:"q", d:"Quit the more or less pager."},
  {c:"view", cmd:"wc file", d:"Count lines, words, and characters in a file."},
  {c:"view", cmd:"wc -l file1.txt", d:"Count lines in file1.txt."},
  {c:"view", cmd:"wc -c file1.txt", d:"Count bytes/characters in file1.txt."},
  {c:"view", cmd:"wc -w file1.txt", d:"Count words in file1.txt."},
  {c:"view", cmd:"wc -L file1.txt", d:"Print the length of the longest line in file1.txt."},
  {c:"view", cmd:"wc -m file1.txt", d:"Count characters in file1.txt, including multibyte characters."},
  {c:"view", cmd:"wc -l -w -c file1.txt", d:"Count lines, words, and characters together on one line."},

  // Create, Copy, Move & Delete
  {c:"files", cmd:"touch file1.txt", d:"Create a new empty file called file1.txt."},
  {c:"files", cmd:"mkdir new_directory", d:"Create a new directory called new_directory."},
  {c:"files", cmd:"mv file1.txt new_directory/", d:"Move file1.txt into new_directory."},
  {c:"files", cmd:"mv old_name new_name", d:"Rename a file (mv doubles as rename when the destination isn’t a directory)."},
  {c:"files", cmd:"cp file1.txt new_directory/", d:"Copy file1.txt into new_directory."},
  {c:"files", cmd:"cp -R src/ dest/", d:"Copy a directory and all of its contents recursively."},
  {c:"files", cmd:"rm file1.txt", d:"Delete file1.txt."},
  {c:"files", cmd:"rm -r new_directory/", d:"Delete a directory and all of its contents, recursively."},
  {c:"files", cmd:"ln -s target_file link_name", d:"Create a symbolic link named link_name that points to target_file."},
  {c:"files", cmd:"mkdir -p new_directory/sub_directory", d:"Create nested directories in one shot, creating any missing parent directories along the way."},
  {c:"files", cmd:"mkdir -v new_directory", d:"Create a directory and print a confirmation message for each directory created."},
  {c:"files", cmd:"mkdir -m 755 new_directory", d:"Create a directory with permissions set at creation time (755 = rwxr-xr-x)."},

  // grep
  {c:"grep", cmd:'grep "term" file1.txt', d:"Search for “term” in file1.txt and print matching lines."},
  {c:"grep", cmd:'grep "term" f1.txt f2.txt', d:"Search for “term” across multiple files."},
  {c:"grep", cmd:'grep -r "term" /path/', d:"Search recursively through a directory and its subdirectories."},
  {c:"grep", cmd:'grep -i "term" file1.txt', d:"Case-insensitive search."},
  {c:"grep", cmd:'grep -v "term" file1.txt', d:"Print lines that do NOT contain “term” (invert match)."},
  {c:"grep", cmd:'grep -n "term" file1.txt', d:"Print matching lines with their line numbers."},
  {c:"grep", cmd:'grep -c "term" file1.txt', d:"Count the number of matching lines."},
  {c:"grep", cmd:'grep -l "term" /path/', d:"List names of files that contain a match."},
  {c:"grep", cmd:'grep -L "term" /path/', d:"List names of files that do NOT contain a match."},
  {c:"grep", cmd:'grep -E "a|b" file1.txt', d:"Extended regex: match either pattern a or pattern b."},
  {c:"grep", cmd:'grep -A 3 "term" file1.txt', d:"Show 3 lines of context AFTER each match."},
  {c:"grep", cmd:'grep -B 3 "term" file1.txt', d:"Show 3 lines of context BEFORE each match."},
  {c:"grep", cmd:'grep -C 3 "term" file1.txt', d:"Show 3 lines of context before AND after each match."},
  {c:"grep", cmd:'grep -o "term" file1.txt', d:"Print only the matching part of each line, not the whole line."},
  {c:"grep", cmd:'grep -w "term" file1.txt', d:"Match whole words only."},
  {c:"grep", cmd:'grep -P "pattern" file1.txt', d:"Use Perl-compatible regular expressions (PCRE)."},
  {c:"grep", cmd:'grep -f patterns.txt file1.txt', d:"Match against a list of patterns stored in patterns.txt."},
  {c:"grep", cmd:'grep --color=auto "term" file1.txt', d:"Highlight the matched term in the output."},
  {c:"grep", cmd:'grep -R "term" /path/ | less', d:"Recursive search, piped into a pager for page-by-page reading."},
  {c:"grep", cmd:'grep -R --exclude-dir="dir" "term" /path/', d:"Recursive search excluding one directory."},
  {c:"grep", cmd:'grep -R --include="*.txt" "term" /path/', d:"Recursive search limited to .txt files."},
  {c:"grep", cmd:'grep -R --exclude="*.log" "term" /path/', d:"Recursive search excluding .log files."},
  {c:"grep", cmd:'grep -R --exclude-dir={d1,d2} "term" /path/', d:"Recursive search excluding multiple directories."},
  {c:"grep", cmd:'grep -R --include={*.txt,*.md} "term" /path/', d:"Recursive search limited to .txt and .md files."},

  // find & which
  {c:"find", cmd:'find /path/ -name "file1.txt"', d:"Find a file named file1.txt anywhere under /path/."},
  {c:"find", cmd:'find /path/ -type f -name "*.txt"', d:"Find all .txt files under /path/."},
  {c:"find", cmd:'find /path/ -type d -name "subdir"', d:"Find all directories named subdir under /path/."},
  {c:"find", cmd:"find /path/ -type f -size +1M", d:"Find all files larger than 1 megabyte."},
  {c:"find", cmd:"find /path/ -type f -mtime -7", d:"Find all files modified within the last 7 days."},
  {c:"find", cmd:"find /path/ -type f -perm 644", d:"Find all files with permissions set to 644."},
  {c:"find", cmd:'find /path/ -type f -exec grep "term" {} \\;', d:"Run grep on every file found by find."},
  {c:"find", cmd:"which command_name", d:"Show the full path of the executable that would run for a command."},

  // Networking — curl
  {c:"curl", cmd:"curl https://example.com", d:"Fetch a URL and print the response body to the terminal."},
  {c:"curl", cmd:"curl -O https://example.com/file.txt", d:"Download a file, saving it under its original filename."},
  {c:"curl", cmd:"curl -o myname.txt https://example.com/f.txt", d:"Download a file and save it under a custom filename."},
  {c:"curl", cmd:"curl -L https://example.com/file.zip -o file.txt", d:"Download a file, following any redirects, and save it as file.txt."},
  {c:"curl", cmd:"curl -I https://example.com", d:"Fetch only the response headers (no body) — useful for checking if a URL is alive."},
  {c:"curl", cmd:"curl -L https://example.com", d:"Follow redirects instead of stopping at the first 3xx response."},
  {c:"curl", cmd:"curl -sS https://webi.sh/lsd | sh", d:"Download a script silently (-s) but still show errors (-S), piping it straight into sh to run — this is how lsd gets installed."},
  {c:"curl", cmd:"curl ftp://example.com/file.txt", d:"Fetch a file over FTP."},
  {c:"curl", cmd:"curl sftp://example.com/file.txt", d:"Fetch a file over SFTP (FTP tunneled through SSH)."},
  {c:"curl", cmd:"curl file:///home/user/file.txt", d:"Read a local file through curl’s URL syntax — no network involved."},
  {c:"curl", cmd:"curl smtp://mail.example.com --mail-from=...", d:"Send mail directly via SMTP."},

  // Permissions & Ownership
  {c:"perm", cmd:"chmod permissions file_name", d:"Change permissions on a file, symbolic (u+x) or numeric (755) format."},
  {c:"perm", cmd:"chmod -R permissions dir_name", d:"Change permissions on a directory and all its contents, recursively."},
  {c:"perm", cmd:"chown user:group file_name", d:"Change the owning user and group of a file."},
  {c:"perm", cmd:"chown -R user:group dir_name", d:"Change ownership of a directory and all its contents, recursively."},
  {c:"perm", cmd:"chmod u+x script.sh", d:"Add execute permission for the owning user."},
  {c:"perm", cmd:"chmod g-w file.txt", d:"Remove write permission for the group."},
  {c:"perm", cmd:"chmod o+r file.txt", d:"Add read permission for others."},
  {c:"perm", cmd:"chmod u=rw,g=r,o= file.txt", d:"Set exact permissions: owner rw, group r, others none."},
  {c:"perm", cmd:"chmod +x script.sh", d:"Add execute permission for everyone."},
  {c:"perm", cmd:"chmod 777 file.txt", d:"Read+write+execute for all (4+2+1=7 per group: owner, group, others)."},

/* ---------------- Render sidebar & sections ---------------- */
const root = document.documentElement;
function hue(c){ return CATS.find(x=>x.id===c).hue; }
function catColor(id, dark){
  const h = hue(id);
  return dark ? `hsl(${h} 55% 62%)` : `hsl(${h} 45% 38%)`;
}
function isDark(){
  const t = root.getAttribute('data-theme');
  if(t) return t === 'dark';
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function paintDots(){
  const dark = isDark();
  document.querySelectorAll('[data-dot]').forEach(el=>{
    el.style.background = catColor(el.getAttribute('data-dot'), dark);
  });
  document.querySelectorAll('[data-cat-chip]').forEach(el=>{
    const c = el.getAttribute('data-cat-chip');
    const col = catColor(c, dark);
    el.style.color = col;
    el.style.background = dark ? col.replace('62%)','20% / .18)').replace('hsl','hsla') : col.replace('38%)','85% / .15)').replace('hsl','hsla');
  });
}

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

sidebar.innerHTML = `<div class="count-all">${ROWS.length} entries · ${CATS.length} sections</div>` +
  CATS.map(cat=>{
    const n = ROWS.filter(r=>r.c===cat.id).length;
    return `<a href="#${cat.id}" data-nav="${cat.id}">
      <span class="dot" data-dot="${cat.id}"></span>
      <span class="label">${cat.label}</span>
      <span class="n">${n}</span>
    </a>`;
  }).join('');

content.innerHTML = CATS.map(cat=>{
  const rows = ROWS.filter(r=>r.c===cat.id);
  return `<section class="cat" id="${cat.id}" data-cat="${cat.id}">
    <div class="cat-head"><span class="dot" data-dot="${cat.id}"></span><h2>${cat.label}</h2></div>
    <p class="cat-desc">${cat.desc}</p>
    <div class="rows">
      ${rows.map(r=>`<div class="row" data-row-id="${r.c}::${escapeAttr(r.cmd)}">
        <code>${escapeHtml(r.cmd)}</code>
        <div class="desc">${escapeHtml(r.d)}</div>
      </div>`).join('')}
    </div>
  </section>`;
}).join('');

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g,'&quot;');
}

paintDots();

/* ---------------- Theme toggle ---------------- */
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
function setThemeIcon(){
  themeIcon.innerHTML = isDark()
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
}
themeToggle.addEventListener('click', ()=>{
  const next = isDark() ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  setThemeIcon();
  paintDots();
});
setThemeIcon();

/* ---------------- Search & jump ---------------- */
const searchInput = document.getElementById('search');
const suggestBox = document.getElementById('suggest');
const clearBtn = document.getElementById('clearBtn');
const resultBar = document.getElementById('resultBar');
let activeIndex = -1;
let currentMatches = [];

function highlight(text, q){
  if(!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0,idx)) + '<mark>' + escapeHtml(text.slice(idx, idx+q.length)) + '</mark>' + escapeHtml(text.slice(idx+q.length));
}

function runFilter(q){
  const query = q.trim().toLowerCase();
  document.body.classList.toggle('filtering', query.length > 0);
  clearBtn.style.display = query.length ? 'block' : 'none';

  let visibleCount = 0;
  CATS.forEach(cat=>{
    const section = document.getElementById(cat.id);
    let anyVisible = false;
    section.querySelectorAll('.row').forEach(rowEl=>{
      const key = rowEl.getAttribute('data-row-id');
      const [c, cmd] = [key.split('::')[0], key.split('::').slice(1).join('::')];
      const data = ROWS.find(r=> r.c===c && r.cmd===cmd);
      const hit = !query || data.cmd.toLowerCase().includes(query) || data.d.toLowerCase().includes(query);
      rowEl.classList.toggle('hidden-by-search', !hit);
      if(hit){
        anyVisible = true; visibleCount++;
        rowEl.querySelector('code').innerHTML = highlight(data.cmd, query);
        rowEl.querySelector('.desc').innerHTML = highlight(data.d, query);
      } else {
        rowEl.querySelector('code').innerHTML = escapeHtml(data.cmd);
        rowEl.querySelector('.desc').innerHTML = escapeHtml(data.d);
      }
    });
    section.classList.toggle('hidden-by-search', !anyVisible);
  });

  if(query){
    resultBar.textContent = `${visibleCount} match${visibleCount===1?'':'es'} for “${q.trim()}”`;
  }
}

function buildSuggestions(q){
  const query = q.trim().toLowerCase();
  if(!query){ suggestBox.classList.remove('open'); suggestBox.innerHTML=''; currentMatches=[]; activeIndex=-1; return; }
  currentMatches = ROWS.filter(r => r.cmd.toLowerCase().includes(query) || r.d.toLowerCase().includes(query)).slice(0, 10);
  activeIndex = -1;
  if(!currentMatches.length){
    suggestBox.innerHTML = `<div class="suggest-empty">No matches. Refine your search.</div>`;
  } else {
    const dark = isDark();
    suggestBox.innerHTML = currentMatches.map((r,i)=>{
      const cat = CATS.find(x=>x.id===r.c);
      const col = catColor(r.c, dark);
      return `<div class="suggest-item" data-i="${i}">
        <code>${highlight(r.cmd, query)}</code>
        <span class="s-desc">${highlight(r.d, query)}</span>
        <span class="s-cat" style="color:${col}">${cat.label}</span>
      </div>`;
    }).join('');
  }
  suggestBox.classList.add('open');
}

function jumpTo(row){
  const section = document.getElementById(row.c);
  section.classList.remove('hidden-by-search');
  const rowEl = section.querySelector(`[data-row-id="${CSS.escape(row.c+'::'+row.cmd)}"]`);
  section.scrollIntoView({behavior:'smooth', block:'start'});
  if(rowEl){
    rowEl.classList.remove('hidden-by-search');
    setTimeout(()=>{
      rowEl.scrollIntoView({behavior:'smooth', block:'center'});
      rowEl.classList.remove('pulse'); void rowEl.offsetWidth; rowEl.classList.add('pulse');
    }, 250);
  }
  suggestBox.classList.remove('open');
}

searchInput.addEventListener('input', (e)=>{
  runFilter(e.target.value);
  buildSuggestions(e.target.value);
});

searchInput.addEventListener('keydown', (e)=>{
  const items = [...suggestBox.querySelectorAll('.suggest-item')];
  if(e.key === 'ArrowDown'){
    if(items.length){ e.preventDefault(); activeIndex = Math.min(activeIndex+1, items.length-1); updateActive(items); }
  } else if(e.key === 'ArrowUp'){
    if(items.length){ e.preventDefault(); activeIndex = Math.max(activeIndex-1, 0); updateActive(items); }
  } else if(e.key === 'Enter'){
    e.preventDefault();
    const pick = activeIndex >= 0 ? currentMatches[activeIndex] : currentMatches[0];
    if(pick) jumpTo(pick);
  } else if(e.key === 'Escape'){
    searchInput.value=''; runFilter(''); buildSuggestions(''); searchInput.blur();
  }
});

function updateActive(items){
  items.forEach((el,i)=> el.classList.toggle('active', i===activeIndex));
  if(items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
}

suggestBox.addEventListener('click', (e)=>{
  const item = e.target.closest('.suggest-item');
  if(!item) return;
  const i = parseInt(item.getAttribute('data-i'),10);
  jumpTo(currentMatches[i]);
});

clearBtn.addEventListener('click', ()=>{
  searchInput.value=''; runFilter(''); buildSuggestions('');
  searchInput.focus();
});

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestBox.classList.remove('open');
});

document.addEventListener('keydown', (e)=>{
  if(e.key === '/' && document.activeElement !== searchInput){
    e.preventDefault(); searchInput.focus();
  }
});

/* ---------------- Sidebar active-section tracking ---------------- */
const navLinks = [...document.querySelectorAll('[data-nav]')];
const sections = [...document.querySelectorAll('section.cat')];
const io = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const id = entry.target.id;
      navLinks.forEach(a=> a.classList.toggle('active', a.getAttribute('data-nav')===id));
    }
  });
}, { rootMargin: '-15% 0px -75% 0px' });
sections.forEach(s=> io.observe(s));
</script>
