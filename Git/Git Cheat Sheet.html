<title>Git Command Cheat Sheet</title>
<meta name="description" content="Searchable, categorized Git command reference" />
<style>
  :root{
    --bg:#14161b;
    --surface:#1b1e25;
    --surface-2:#232630;
    --border:#2d313c;
    --text:#e7e5de;
    --text-muted:#93969e;
    --accent:#e3982f;
    --accent-soft:#3a2c17;
    --accent-2:#5fb3a3;
    --shadow: 0 8px 24px rgba(0,0,0,.35);
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, "SF Mono", Menlo, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"]{
    --bg:#f1efe8;
    --surface:#ffffff;
    --surface-2:#f6f4ee;
    --border:#ddd7c8;
    --text:#23241f;
    --text-muted:#6c6a60;
    --accent:#a8650f;
    --accent-soft:#f3e3c8;
    --accent-2:#2f7d70;
    --shadow: 0 8px 24px rgba(30,25,10,.08);
    color-scheme: light;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      --bg:#f1efe8;
      --surface:#ffffff;
      --surface-2:#f6f4ee;
      --border:#ddd7c8;
      --text:#23241f;
      --text-muted:#6c6a60;
      --accent:#a8650f;
      --accent-soft:#f3e3c8;
      --accent-2:#2f7d70;
      --shadow: 0 8px 24px rgba(30,25,10,.08);
      color-scheme: light;
    }
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:1rem;
    padding:.85rem 1.25rem;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--border);
  }
  .brand{
    display:flex; align-items:baseline; gap:.55rem;
    white-space:nowrap;
  }
  .brand .glyph{
    font-family:var(--mono);
    color:var(--accent);
    font-size:1.1rem;
  }
  .brand h1{
    font-size:1rem;
    font-weight:700;
    letter-spacing:.01em;
    margin:0;
  }
  .brand .sub{
    font-size:.72rem;
    color:var(--text-muted);
    font-family:var(--mono);
  }

  .search-wrap{
    position:relative;
    flex:1;
    max-width:560px;
    margin-left:auto;
  }
  .search-box{
    display:flex; align-items:center; gap:.5rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem .7rem;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-box:focus-within{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .search-box svg{ flex:none; opacity:.6; }
  .search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--text);
    font-family:var(--mono);
    font-size:.88rem;
  }
  .search-box input::placeholder{ color:var(--text-muted); }
  .search-hint{
    font-family:var(--mono);
    font-size:.7rem;
    color:var(--text-muted);
    border:1px solid var(--border);
    border-radius:5px;
    padding:.05rem .35rem;
    flex:none;
  }
  .clear-btn{
    flex:none; display:none;
    background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-size:1rem; line-height:1; padding:0 .1rem;
  }
  .clear-btn:hover{ color:var(--text); }

  .suggest{
    position:absolute; left:0; right:0; top:calc(100% + 6px);
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:min(60vh, 420px);
    overflow-y:auto;
    display:none;
    z-index:40;
  }
  .suggest.open{ display:block; }
  .suggest-item{
    display:flex; align-items:center; gap:.6rem;
    padding:.5rem .7rem;
    cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .suggest-item:last-child{ border-bottom:none; }
  .suggest-item.active, .suggest-item:hover{ background:var(--surface-2); }
  .suggest-item code{
    font-family:var(--mono);
    font-size:.82rem;
    color:var(--accent);
    white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
    max-width:38%;
  }
  .suggest-item .s-desc{
    font-size:.76rem;
    color:var(--text-muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    flex:1;
  }
  .suggest-item .s-cat{
    flex:none;
    font-size:.65rem;
    font-family:var(--mono);
    padding:.1rem .4rem;
    border-radius:99px;
    white-space:nowrap;
  }
  .suggest-empty{
    padding:.75rem .9rem;
    font-size:.8rem;
    color:var(--text-muted);
  }

  .theme-toggle{
    flex:none;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    width:2.15rem; height:2.15rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:var(--text);
  }
  .theme-toggle:hover{ border-color:var(--accent); }

  /* ---------- Layout ---------- */
  .shell{
    display:grid;
    grid-template-columns:220px 1fr;
    max-width:1280px;
    margin:0 auto;
  }
  nav.sidebar{
    position:sticky;
    top:60px;
    align-self:start;
    height:calc(100vh - 60px);
    overflow-y:auto;
    padding:1.1rem .75rem 2rem;
    border-right:1px solid var(--border);
  }
  .sidebar .count-all{
    font-family:var(--mono);
    font-size:.72rem;
    color:var(--text-muted);
    padding:0 .6rem .6rem;
  }
  .sidebar a{
    display:flex; align-items:center; gap:.5rem;
    text-decoration:none;
    font-size:.83rem;
    color:var(--text-muted);
    padding:.42rem .6rem;
    border-radius:8px;
    margin-bottom:2px;
  }
  .sidebar a:hover{ background:var(--surface-2); color:var(--text); }
  .sidebar a.active{ background:var(--accent-soft); color:var(--text); font-weight:600; }
  .sidebar .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .sidebar .label{ flex:1; }
  .sidebar .n{ font-family:var(--mono); font-size:.7rem; color:var(--text-muted); }

  main{ padding:1.5rem 1.75rem 4rem; min-width:0; }

  .result-bar{
    display:none;
    align-items:center; gap:.5rem;
    font-size:.8rem;
    color:var(--text-muted);
    margin-bottom:1rem;
    font-family:var(--mono);
  }
  body.filtering .result-bar{ display:flex; }

  section.cat{
    margin-bottom:2.25rem;
    scroll-margin-top:70px;
  }
  section.cat.hidden-by-search{ display:none; }
  .cat-head{
    display:flex; align-items:baseline; gap:.6rem;
    margin-bottom:.15rem;
  }
  .cat-head .dot{ width:10px; height:10px; border-radius:50%; flex:none; }
  .cat-head h2{
    font-size:1.05rem;
    margin:0;
    letter-spacing:.01em;
  }
  .cat-desc{
    color:var(--text-muted);
    font-size:.82rem;
    margin:.15rem 0 .9rem;
    max-width:62ch;
  }

  .rows{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
  }
  .row{
    display:grid;
    grid-template-columns:minmax(160px,320px) 1fr;
    gap:.4rem 1rem;
    padding:.62rem .9rem;
    border-bottom:1px solid var(--border);
    align-items:start;
  }
  .row:last-child{ border-bottom:none; }
  .row.hidden-by-search{ display:none; }
  .row.pulse{ animation: pulse 1.1s ease; }
  @keyframes pulse{
    0%{ background:var(--accent-soft); }
    100%{ background:transparent; }
  }
  .row code{
    font-family:var(--mono);
    font-size:.83rem;
    color:var(--accent);
    word-break:break-word;
  }
  .row .desc{
    font-size:.83rem;
    color:var(--text-muted);
    line-height:1.5;
  }
  .row mark, .suggest-item mark{
    background:var(--accent-soft);
    color:var(--text);
    border-radius:3px;
    padding:0 1px;
  }

  @media (max-width:960px){
    .shell{ grid-template-columns:1fr; }
    nav.sidebar{
      position:sticky; top:60px; height:auto;
      display:flex; gap:.4rem; overflow-x:auto; overflow-y:hidden;
      border-right:none; border-bottom:1px solid var(--border);
      padding:.6rem .75rem;
      background:var(--bg);
    }
    .sidebar .count-all{ display:none; }
    .sidebar a{ flex:none; }
    .row{ grid-template-columns:1fr; }
  }
  @media (max-width:560px){
    .brand .sub{ display:none; }
    .search-hint{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .row.pulse{ animation:none; }
  }

  footer{
    text-align:center;
    font-size:.72rem;
    color:var(--text-muted);
    padding:1.5rem 0 2.5rem;
    font-family:var(--mono);
  }
</style>

<div class="topbar">
  <div class="brand">
    <span class="glyph">&gt;_</span>
    <h1>Git Cheat Sheet</h1>
    <span class="sub">git · Ubuntu/WSL</span>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search commands, flags, concepts…" autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn" title="Clear" aria-label="Clear search">&times;</button>
      <span class="search-hint">/</span>
    </div>
    <div class="suggest" id="suggest"></div>
  </div>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle color theme">
    <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main>
    <div class="result-bar" id="resultBar"></div>
    <div id="content"></div>
    <footer>Generated from git_commands.sh &amp; hashes.sh</footer>
  </main>
</div>

<script>
/* ---------------- Data ---------------- */
const CATS = [
  { id:"install",  label:"Install & Setup",              hue:14,  desc:"Get Git (and gh) installed and talking English on Ubuntu." },
  { id:"help",     label:"Help & Manual",                hue:45,  desc:"Navigate Git's built-in manual pages." },
  { id:"config",   label:"Configuration",                hue:75,  desc:"Set identity, defaults and preferences at system, global or local scope." },
  { id:"init",     label:"Starting a Repository",        hue:105, desc:"Create a new repo or copy an existing one." },
  { id:"workflow", label:"Staging & Committing",         hue:135, desc:"The core local loop: see changes, stage them, commit them." },
  { id:"branch",   label:"Branching & Merging",          hue:165, desc:"Create, switch, rename and combine lines of work." },
  { id:"remote",   label:"Working with Remotes",         hue:195, desc:"Connect to, inspect, and sync with remote repositories." },
  { id:"stash",    label:"Stashing & Tags",               hue:225, desc:"Shelve work-in-progress and mark specific commits." },
  { id:"plumbing", label:"Plumbing — Low-Level Commands", hue:255, desc:"The internal building blocks porcelain commands sit on top of." },
  { id:"ignore",   label:".gitignore",                    hue:285, desc:"Keep files out of version control on purpose." },
  { id:"concept",  label:"Git Concepts",                  hue:315, desc:"Background knowledge behind the commands above." },
];

const ROWS = [
  // Install & Setup
  {c:"install", cmd:"sudo apt update", d:"Refresh package lists before installing Git."},
  {c:"install", cmd:"sudo apt install software-properties-common", d:"Enables the add-apt-repository command."},
  {c:"install", cmd:"sudo add-apt-repository ppa:git-core/ppa", d:"Add the official Git PPA to get the latest stable release."},
  {c:"install", cmd:"sudo apt install git", d:"Install Git."},
  {c:"install", cmd:"sudo apt-get install language-pack-en", d:"Add English language support so Git messages display in English."},
  {c:"install", cmd:"export LANG=en_US.UTF-8", d:"Set the shell's language to English (US) for this session."},
  {c:"install", cmd:"export LC_ALL=en_US.UTF-8", d:"Set the full locale to English (US) for this session."},
  {c:"install", cmd:"sudo locale-gen en_US.UTF-8", d:"Generate the en_US.UTF-8 locale if it's missing — run if the export commands above don't take effect."},
  {c:"install", cmd:"sudo update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8 LANGUAGE=en", d:"Persist the English locale as the system default (survives new shells)."},
  {c:"install", cmd:"curl -sS https://webi.sh/gh | sh", d:"Install the GitHub CLI (gh) via Webi."},

  // Help & Manual
  {c:"help", cmd:"git help git", d:"Open the full manual page for Git."},
  {c:"help", cmd:"q", d:"Quit the manual pager."},
  {c:"help", cmd:"j / k", d:"Move one line down / up in the pager."},
  {c:"help", cmd:"d / u", d:"Scroll half a page down / up."},
  {c:"help", cmd:"/<term>", d:"Search the open manual page for <term>."},
  {c:"help", cmd:"n / N", d:"Jump to the next / previous search match."},

  // Configuration
  {c:"config", cmd:"git rev-parse --show-toplevel", d:"Show the root directory of the current Git repository."},
  {c:"config", cmd:'git config --global user.name "Your Name"', d:"Set the name attached to your commits, globally."},
  {c:"config", cmd:'git config --global user.email "you@example.com"', d:"Set the email attached to your commits, globally."},
  {c:"config", cmd:'git config set --global user.name "Your Name"', d:"Same as above, using Git 2.46+'s newer, clearer subcommand syntax."},
  {c:"config", cmd:"git config set --global init.defaultBranch master", d:"Set the default branch name (e.g. master or main) for new repos."},
  {c:"config", cmd:"git config get user.name", d:"Read back a single config value."},
  {c:"config", cmd:"cat ~/.gitconfig", d:"View the full global config file directly."},
  {c:"config", cmd:'git config --local user.email "work@example.com"', d:"Override a setting for just this repository (e.g. a work email)."},
  {c:"config", cmd:"git config list --local", d:"List only the config values scoped to the current repository."},
  {c:"config", cmd:"cat .git/config", d:"View the local (per-repo) config file directly — lives inside .git/, not your home directory."},
  {c:"config", cmd:"git config --unset user.email", d:"Remove a config key from whichever scope Git checks by default."},
  {c:"config", cmd:"git config --local --unset user.email", d:"Remove a key specifically from .git/config (this repo only)."},
  {c:"config", cmd:"git config --global --unset user.email", d:"Remove a key specifically from ~/.gitconfig."},
  {c:"config", cmd:"git config unset --local user.email", d:"Same removal, using the newer subcommand syntax."},
  {c:"config", cmd:"git config unset --all user.email", d:"Remove every value for a key that allows duplicates."},
  {c:"config", cmd:"git config --remove-section alias", d:"Remove an entire config section (e.g. all of [alias]), not just one key."},
  {c:"config", cmd:"git config --edit --local", d:"Open .git/config directly in your default editor to edit or delete by hand."},
  {c:"config", cmd:"git config set pull.rebase false", d:"Make git pull merge by default."},
  {c:"config", cmd:"git config set --global pull.rebase true", d:"Make git pull rebase by default, globally."},

  // Starting a Repository
  {c:"init", cmd:"git init", d:"Create an empty Git repository in the current directory (or reinitialize an existing one)."},
  {c:"init", cmd:"git clone <repo>", d:"Copy an existing repository — local path or URL — into a new directory."},

  // Staging & Committing
  {c:"workflow", cmd:"git status", d:"Show the working tree status: staged, unstaged, and untracked changes."},
  {c:"workflow", cmd:"git add <file>", d:"Add a file's contents to the index (staging area)."},
  {c:"workflow", cmd:"git diff", d:"Show unstaged changes — working tree vs. the index."},
  {c:"workflow", cmd:"git diff --staged", d:"Show staged changes — index vs. the last commit."},
  {c:"workflow", cmd:'git commit -m "message"', d:"Record staged changes as a new commit."},
  {c:"workflow", cmd:"git log", d:"Show commit history."},
  {c:"workflow", cmd:"git log --decorate=<short|full|no>", d:"Control how much branch/ref decoration is shown next to each commit."},
  {c:"workflow", cmd:"git log --oneline", d:"Show log history compacted to one line per commit."},
  {c:"workflow", cmd:"git --no-pager log -n 10", d:"Show the last 10 commits without paging."},
  {c:"workflow", cmd:"git log --oneline --graph --all", d:"ASCII graph of every branch, showing where they split and merge."},
  {c:"workflow", cmd:"git rm <file>", d:"Remove a file from the working tree and the index."},
  {c:"workflow", cmd:"git mv <old> <new>", d:"Move or rename a file, directory, or symlink, and stage the change."},
  {c:"workflow", cmd:"git reset <file>", d:"Unstage a file — removes it from the index, keeps the changes in your working tree."},
  {c:"workflow", cmd:"git reset --hard <commit>", d:"Move HEAD to a commit and discard ALL changes since — destructive, deleted for good."},
  {c:"workflow", cmd:"git reset --soft <commit>", d:"Move HEAD to a commit; everything since becomes staged (committed → staged, uncommitted stays staged/unstaged)."},

  // Branching & Merging
  {c:"branch", cmd:"git branch", d:"List local branches."},
  {c:"branch", cmd:"git branch <new>", d:"Create a new branch."},
  {c:"branch", cmd:"git switch <branch>", d:"Switch to an existing branch."},
  {c:"branch", cmd:"git switch -c <branch>", d:"Create a new branch and switch to it in one step."},
  {c:"branch", cmd:"git switch -c <branch> <commit>", d:"Create a new branch whose tip starts at a specific commit hash."},
  {c:"branch", cmd:"git checkout <branch>", d:"Older, overloaded command — switches branches OR restores files, depending on the arguments."},
  {c:"branch", cmd:"git restore <file>", d:"Discard unstaged changes to a file (modern replacement for checkout -- <file>)."},
  {c:"branch", cmd:"git merge <branch>", d:"Merge <branch> into the current branch."},
  {c:"branch", cmd:"git branch -m <old> <new>", d:"Rename an existing branch."},
  {c:"branch", cmd:"git branch -vv", d:"List branches with their last commit and upstream-tracking info."},
  {c:"branch", cmd:".git/refs/heads", d:"Directory holding one file per branch, each containing the commit hash that branch points to."},

  // Working with Remotes
  {c:"remote", cmd:"git remote -v", d:"List configured remote repositories and their URLs."},
  {c:"remote", cmd:"git ls-remote", d:"List the refs/addresses of a remote repository."},
  {c:"remote", cmd:"git fetch", d:"Download objects and refs from a remote, without merging."},
  {c:"remote", cmd:"git pull", d:"Fetch AND merge (or rebase) from a remote branch into the current branch."},
  {c:"remote", cmd:"git pull <remote> <branch>", d:"Fetch a specific remote branch into the current local branch."},
  {c:"remote", cmd:"git push", d:"Upload local commits to a remote branch."},
  {c:"remote", cmd:"git push <remote> <branch>", d:"Upload a specific local branch's commits to a specific remote branch."},
  {c:"remote", cmd:"git remote add <name> <url>", d:"Create and name a connection to a remote repo — local path or URL."},
  {c:"remote", cmd:"git remote remove <name>", d:"Remove a remote."},
  {c:"remote", cmd:"git remote show origin", d:"Detailed info on the origin remote — tracked branches, ahead/behind status, etc."},
  {c:"remote", cmd:"git remote get-url origin", d:"Print just the URL configured for a remote."},
  {c:"remote", cmd:"git remote set-url origin <url>", d:"Change the URL a remote points to — e.g. after a repo moves, or switching HTTP to SSH."},
  {c:"remote", cmd:"git remote rename origin upstream", d:"Rename a remote — common when adding a fork's real source as a second remote."},
  {c:"remote", cmd:"git log <remote>/<branch> --oneline", d:"Show the commit log of a remote-tracking branch."},

  // Stashing & Tags
  {c:"stash", cmd:"git stash", d:"Temporarily shelve uncommitted changes so you can switch context."},
  {c:"stash", cmd:"git stash pop", d:"Reapply the most recently stashed changes and remove them from the stash list."},
  {c:"stash", cmd:"git tag <name>", d:"Create a lightweight tag pointing at the current commit."},
  {c:"stash", cmd:'git tag -a <name> -m "message"', d:"Create an annotated tag (recommended — stores author, date, and message)."},

  // Plumbing — Low-Level Commands
  {c:"plumbing", cmd:"git apply <patch>", d:"Apply a patch to files and/or the index."},
  {c:"plumbing", cmd:"git apply --check <patch>", d:"Verify a patch would apply cleanly, without actually applying it."},
  {c:"plumbing", cmd:"git commit-tree <tree>", d:"Create a new commit object directly, without touching the index."},
  {c:"plumbing", cmd:"git hash-object <file>", d:"Compute the SHA-1 object ID of a file (add -w to also store it as a blob)."},
  {c:"plumbing", cmd:"git cat-file -p <hash>", d:"Pretty-print the contents of a Git object (commit, tree, or blob) given its hash."},
  {c:"plumbing", cmd:"git cat-file -t <hash>", d:"Show the TYPE of an object (commit, tree, blob, or tag) instead of its contents."},
  {c:"plumbing", cmd:"xxd /path/object/file", d:"View the raw bytes of a Git object file directly — watch for 7- vs 8-column hex padding quirks."},
  {c:"plumbing", cmd:"find .git/objects -type f", d:"List every object currently stored in the repo (skips the hash-prefix directories)."},

  // .gitignore
  {c:"ignore", cmd:"touch .gitignore", d:"Create a .gitignore file."},
  {c:"ignore", cmd:"cat .gitignore", d:"View which files and patterns are currently being ignored."},
  {c:"ignore", cmd:"node_modules/", d:"Ignore an entire directory (and everything below it, from this point down)."},
  {c:"ignore", cmd:"/config.local.json", d:"Ignore a specific file at the repo root only — the leading slash anchors the path."},
  {c:"ignore", cmd:"*.txt", d:"Ignore every file matching a wildcard pattern."},
  {c:"ignore", cmd:"!/important.txt", d:"Negate a previous rule to un-ignore a specific file — order matters, since a later wildcard can override an earlier negation."},

  // Git Concepts
  {c:"concept", cmd:"SHA / commit hash", d:"Git uses the SHA-1 cryptographic hash function to generate commit hashes — you'll often hear them called “SHAs.”"},
  {c:"concept", cmd:"What changes a commit's hash", d:"The file contents, the commit message, author/committer info, the timestamp, and the parent commit(s) — change any of these and the hash changes."},
  {c:"concept", cmd:"Git objects", d:"Git stores everything — commits, trees, blobs, tags — as objects inside .git/objects."},
  {c:"concept", cmd:"Porcelain vs. plumbing", d:"Porcelain commands (status, add, commit, push…) are the user-facing interface. Plumbing commands (hash-object, cat-file, commit-tree…) are the low-level building blocks underneath."},
  {c:"concept", cmd:"git config --global alias.co checkout", d:"Git has its own alias system, stored in ~/.gitconfig — this creates git co as a shortcut for git checkout."},
  {c:"concept", cmd:"Config file locations", d:"system: /etc/gitconfig (all users) → global: ~/.gitconfig (all your repos) → local: .git/config (this repo) → worktree: .git/config.worktree (part of a repo). Each level overrides the one before it."},
  {c:"concept", cmd:'"origin"', d:"Just a naming convention, not a keyword — it's the default name Git suggests for your primary remote."},
];

/* ---------------- Render sidebar & sections ---------------- */
const root = document.documentElement;
function hue(c){ return CATS.find(x=>x.id===c).hue; }
function catColor(id, dark){
  const h = hue(id);
  return dark ? `hsl(${h} 55% 62%)` : `hsl(${h} 45% 38%)`;
}
function isDark(){
  const t = root.getAttribute('data-theme');
  if(t) return t === 'dark';
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function paintDots(){
  const dark = isDark();
  document.querySelectorAll('[data-dot]').forEach(el=>{
    el.style.background = catColor(el.getAttribute('data-dot'), dark);
  });
  document.querySelectorAll('[data-cat-chip]').forEach(el=>{
    const c = el.getAttribute('data-cat-chip');
    const col = catColor(c, dark);
    el.style.color = col;
    el.style.background = dark ? col.replace('62%)','20% / .18)').replace('hsl','hsla') : col.replace('38%)','85% / .15)').replace('hsl','hsla');
  });
}

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

sidebar.innerHTML = `<div class="count-all">${ROWS.length} entries · ${CATS.length} sections</div>` +
  CATS.map(cat=>{
    const n = ROWS.filter(r=>r.c===cat.id).length;
    return `<a href="#${cat.id}" data-nav="${cat.id}">
      <span class="dot" data-dot="${cat.id}"></span>
      <span class="label">${cat.label}</span>
      <span class="n">${n}</span>
    </a>`;
  }).join('');

content.innerHTML = CATS.map(cat=>{
  const rows = ROWS.filter(r=>r.c===cat.id);
  return `<section class="cat" id="${cat.id}" data-cat="${cat.id}">
    <div class="cat-head"><span class="dot" data-dot="${cat.id}"></span><h2>${cat.label}</h2></div>
    <p class="cat-desc">${cat.desc}</p>
    <div class="rows">
      ${rows.map(r=>`<div class="row" data-row-id="${r.c}::${escapeAttr(r.cmd)}">
        <code>${escapeHtml(r.cmd)}</code>
        <div class="desc">${escapeHtml(r.d)}</div>
      </div>`).join('')}
    </div>
  </section>`;
}).join('');

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g,'&quot;');
}

paintDots();

/* ---------------- Theme toggle ---------------- */
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
function setThemeIcon(){
  themeIcon.innerHTML = isDark()
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
}
themeToggle.addEventListener('click', ()=>{
  const next = isDark() ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  setThemeIcon();
  paintDots();
});
setThemeIcon();

/* ---------------- Search & jump ---------------- */
const searchInput = document.getElementById('search');
const suggestBox = document.getElementById('suggest');
const clearBtn = document.getElementById('clearBtn');
const resultBar = document.getElementById('resultBar');
let activeIndex = -1;
let currentMatches = [];

function highlight(text, q){
  if(!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0,idx)) + '<mark>' + escapeHtml(text.slice(idx, idx+q.length)) + '</mark>' + escapeHtml(text.slice(idx+q.length));
}

function runFilter(q){
  const query = q.trim().toLowerCase();
  document.body.classList.toggle('filtering', query.length > 0);
  clearBtn.style.display = query.length ? 'block' : 'none';

  let visibleCount = 0;
  CATS.forEach(cat=>{
    const section = document.getElementById(cat.id);
    let anyVisible = false;
    section.querySelectorAll('.row').forEach(rowEl=>{
      const key = rowEl.getAttribute('data-row-id');
      const [c, cmd] = [key.split('::')[0], key.split('::').slice(1).join('::')];
      const data = ROWS.find(r=> r.c===c && r.cmd===cmd);
      const hit = !query || data.cmd.toLowerCase().includes(query) || data.d.toLowerCase().includes(query);
      rowEl.classList.toggle('hidden-by-search', !hit);
      if(hit){
        anyVisible = true; visibleCount++;
        rowEl.querySelector('code').innerHTML = highlight(data.cmd, query);
        rowEl.querySelector('.desc').innerHTML = highlight(data.d, query);
      } else {
        rowEl.querySelector('code').innerHTML = escapeHtml(data.cmd);
        rowEl.querySelector('.desc').innerHTML = escapeHtml(data.d);
      }
    });
    section.classList.toggle('hidden-by-search', !anyVisible);
  });

  if(query){
    resultBar.textContent = `${visibleCount} match${visibleCount===1?'':'es'} for “${q.trim()}”`;
  }
}

function buildSuggestions(q){
  const query = q.trim().toLowerCase();
  if(!query){ suggestBox.classList.remove('open'); suggestBox.innerHTML=''; currentMatches=[]; activeIndex=-1; return; }
  currentMatches = ROWS.filter(r => r.cmd.toLowerCase().includes(query) || r.d.toLowerCase().includes(query)).slice(0, 10);
  activeIndex = -1;
  if(!currentMatches.length){
    suggestBox.innerHTML = `<div class="suggest-empty">No matches. Refine your search.</div>`;
  } else {
    const dark = isDark();
    suggestBox.innerHTML = currentMatches.map((r,i)=>{
      const cat = CATS.find(x=>x.id===r.c);
      const col = catColor(r.c, dark);
      return `<div class="suggest-item" data-i="${i}">
        <code>${highlight(r.cmd, query)}</code>
        <span class="s-desc">${highlight(r.d, query)}</span>
        <span class="s-cat" style="color:${col}">${cat.label}</span>
      </div>`;
    }).join('');
  }
  suggestBox.classList.add('open');
}

function jumpTo(row){
  const section = document.getElementById(row.c);
  section.classList.remove('hidden-by-search');
  const rowEl = section.querySelector(`[data-row-id="${CSS.escape(row.c+'::'+row.cmd)}"]`);
  section.scrollIntoView({behavior:'smooth', block:'start'});
  if(rowEl){
    rowEl.classList.remove('hidden-by-search');
    setTimeout(()=>{
      rowEl.scrollIntoView({behavior:'smooth', block:'center'});
      rowEl.classList.remove('pulse'); void rowEl.offsetWidth; rowEl.classList.add('pulse');
    }, 250);
  }
  suggestBox.classList.remove('open');
}

searchInput.addEventListener('input', (e)=>{
  runFilter(e.target.value);
  buildSuggestions(e.target.value);
});

searchInput.addEventListener('keydown', (e)=>{
  const items = [...suggestBox.querySelectorAll('.suggest-item')];
  if(e.key === 'ArrowDown'){
    if(items.length){ e.preventDefault(); activeIndex = Math.min(activeIndex+1, items.length-1); updateActive(items); }
  } else if(e.key === 'ArrowUp'){
    if(items.length){ e.preventDefault(); activeIndex = Math.max(activeIndex-1, 0); updateActive(items); }
  } else if(e.key === 'Enter'){
    e.preventDefault();
    const pick = activeIndex >= 0 ? currentMatches[activeIndex] : currentMatches[0];
    if(pick) jumpTo(pick);
  } else if(e.key === 'Escape'){
    searchInput.value=''; runFilter(''); buildSuggestions(''); searchInput.blur();
  }
});

function updateActive(items){
  items.forEach((el,i)=> el.classList.toggle('active', i===activeIndex));
  if(items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
}

suggestBox.addEventListener('click', (e)=>{
  const item = e.target.closest('.suggest-item');
  if(!item) return;
  const i = parseInt(item.getAttribute('data-i'),10);
  jumpTo(currentMatches[i]);
});

clearBtn.addEventListener('click', ()=>{
  searchInput.value=''; runFilter(''); buildSuggestions('');
  searchInput.focus();
});

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestBox.classList.remove('open');
});

document.addEventListener('keydown', (e)=>{
  if(e.key === '/' && document.activeElement !== searchInput){
    e.preventDefault(); searchInput.focus();
  }
});

/* ---------------- Sidebar active-section tracking ---------------- */
const navLinks = [...document.querySelectorAll('[data-nav]')];
const sections = [...document.querySelectorAll('section.cat')];
const io = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const id = entry.target.id;
      navLinks.forEach(a=> a.classList.toggle('active', a.getAttribute('data-nav')===id));
    }
  });
}, { rootMargin: '-15% 0px -75% 0px' });
sections.forEach(s=> io.observe(s));
</script>
